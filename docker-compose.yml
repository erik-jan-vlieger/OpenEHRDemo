networks:
  ehrbase-net:
    driver: bridge

services:
  # ── PostgreSQL backend voor EHRbase ──
  ehrdb:
    image: ehrbase/ehrbase-v2-postgres:16.2
    networks: [ehrbase-net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EHRBASE_USER_ADMIN: ehrbase
      EHRBASE_PASSWORD_ADMIN: ehrbase
      EHRBASE_USER: ehrbase_restricted
      EHRBASE_PASSWORD: ehrbase_restricted
    ports: ['5432:5432']
    volumes:
      - ehrbase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── EHRbase CDR (openEHR server) ──
  ehrbase:
    image: ehrbase/ehrbase:2.29.0
    networks: [ehrbase-net]
    depends_on:
      ehrdb:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://ehrdb:5432/ehrbase
      DB_USER: ehrbase_restricted
      DB_PASS: ehrbase_restricted
      DB_USER_ADMIN: ehrbase
      DB_PASS_ADMIN: ehrbase
      SECURITY_AUTHTYPE: BASIC
      SECURITY_AUTHUSER: ehrbase-user
      SECURITY_AUTHPASSWORD: SuperSecretPassword
      SERVER_NODENAME: sensire.ehrbase.local
    ports: ['8080:8080']
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ehrbase/rest/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── pgAdmin (visueel PostgreSQL bewijs) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    networks: [ehrbase-net]
    environment:
      PGADMIN_DEFAULT_EMAIL: demo@sensire.nl
      PGADMIN_DEFAULT_PASSWORD: demo
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports: ['5050:80']
    depends_on:
      ehrdb:
        condition: service_healthy
    profiles: ['tools']

  # ── openEHRTool (GUI browser voor EHRbase) ──
  openehrtool:
    image: crs4/openehrtool:latest
    networks: [ehrbase-net]
    ports: ['8888:80']
    depends_on:
      ehrbase:
        condition: service_healthy
    profiles: ['tools']

volumes:
  ehrbase_data:
